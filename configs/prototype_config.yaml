project:
  name: OralCare-AI
  schema_version: "1.0"
  random_seed: 468
  demo_mode: true
  disclaimer: "Decision-support prototype only. Not a final medical diagnosis or clinically validated risk tool."

paths:
  data_samples_dir: data_samples
  artifacts_dir: artifacts
  feature_contract: data_contracts/feature_contract.json
  label_contract: data_contracts/label_contract.json

labels:
  diagnosis_classes:
    - benign
    - precancer
    - cancer
  risk_classes:
    low:
      min: 0.0
      max: 0.39
    medium:
      min: 0.4
      max: 0.69
    high:
      min: 0.7
      max: 1.0

modalities:
  intraoral:
    embedding_dim: 256
  clinical:
    embedding_dim: 128
  histopathology:
    embedding_dim: 256
  genomics:
    embedding_dim: 128

genomics:
  mode: artifact
  artifact_path: artifacts/genomics_model.joblib
  training:
    label_column: risk_label
    patient_id_column: patient_id
    positive_label: high
    test_size: 0.2
    min_training_rows: 20
  embedding_dim: 128
  top_k_features: 5
  missing_rate_warning_threshold: 0.3
  low_confidence_threshold: 0.6
  high_risk_threshold: 0.7
  medium_risk_threshold: 0.4
  selected_gene_panel:
