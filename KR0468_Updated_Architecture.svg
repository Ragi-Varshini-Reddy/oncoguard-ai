<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1900" viewBox="0 0 1800 1900" role="img">
  <title>KR0468 Updated Hackathon Architecture — Explainable Multimodal Oral Cancer AI</title>
  <desc>Revised architecture with data sources, cohort alignment, modality-specific preprocessing and encoders, missing-modality-aware transformer fusion, prediction heads, XAI, deployment, and hackathon USP layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#581c87"/>
      <stop offset="1" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#831843"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#d1d5db" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #cbd5e1; }
      .layer { font-family: Inter, Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #e2e8f0; letter-spacing: .4px; }
      .boxTitle { font-family: Inter, Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #ffffff; }
      .boxText { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #dbeafe; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 500; fill: #cbd5e1; }
      .contract { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #fef3c7; }
      .arrow { stroke: #d1d5db; stroke-width: 3; fill: none; marker-end: url(#arrow); opacity: .95; }
      .softArrow { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); opacity: .7; stroke-dasharray: 7 7; }
      .dash { stroke: #fbbf24; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; opacity: .75; }
    </style>
  </defs>

  <rect width="1800" height="1900" fill="url(#bg)"/>
  <rect x="36" y="36" width="1728" height="1828" rx="30" fill="none" stroke="#334155" stroke-width="2"/>

  <text x="900" y="90" text-anchor="middle" class="title">KR0468 Updated Architecture — Hackathon-Ready Multimodal Oral Cancer AI</text>
  <text x="900" y="124" text-anchor="middle" class="subtitle">Clinical images + histopathology + clinical data + genomics → missing-modality-aware fusion → explainable diagnosis and risk report</text>

  <!-- Phase legend -->
  <rect x="70" y="150" width="1660" height="60" rx="18" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="187" class="tiny">TEAM OWNERSHIP:</text>
  <text x="250" y="187" class="tiny">Member 1 → Phase 1: Intraoral + Clinical</text>
  <text x="590" y="187" class="tiny">Member 2 → Phase 2: Histopathology</text>
  <text x="900" y="187" class="tiny">You → Phase 3: Genomics</text>
  <text x="1160" y="187" class="tiny">Joint → Phase 4: Fusion + XAI + Deployment</text>

  <!-- Layer 1 -->
  <text x="90" y="250" class="layer">1. DATA SOURCES</text>
  <rect x="70" y="275" width="310" height="130" rx="18" fill="url(#blue)" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="225" y="315" text-anchor="middle" class="boxTitle">Intraoral Photos</text>
  <text x="225" y="345" text-anchor="middle" class="boxText">Kaggle oral cancer images</text>
  <text x="225" y="372" text-anchor="middle" class="boxText">JPG/PNG lesion photos</text>

  <rect x="410" y="275" width="310" height="130" rx="18" fill="url(#blue)" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="565" y="315" text-anchor="middle" class="boxTitle">Clinical Parameters</text>
  <text x="565" y="345" text-anchor="middle" class="boxText">custom form + TCGA clinical</text>
  <text x="565" y="372" text-anchor="middle" class="boxText">age, sex, habits, lesion info</text>

  <rect x="750" y="275" width="310" height="130" rx="18" fill="url(#blue)" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="905" y="315" text-anchor="middle" class="boxTitle">Histopathology</text>
  <text x="905" y="345" text-anchor="middle" class="boxText">Mendeley / TCGA patches</text>
  <text x="905" y="372" text-anchor="middle" class="boxText">biopsy / tissue images</text>

  <rect x="1090" y="275" width="310" height="130" rx="18" fill="url(#purple)" stroke="#c084fc" filter="url(#shadow)"/>
  <text x="1245" y="315" text-anchor="middle" class="boxTitle">Genomics</text>
  <text x="1245" y="345" text-anchor="middle" class="boxText">TCGA-HNSC / GDC primary</text>
  <text x="1245" y="372" text-anchor="middle" class="boxText">GEO optional validation</text>

  <rect x="1430" y="275" width="300" height="130" rx="18" fill="#334155" stroke="#94a3b8" filter="url(#shadow)"/>
  <text x="1580" y="315" text-anchor="middle" class="boxTitle">Hackathon Demo Data</text>
  <text x="1580" y="345" text-anchor="middle" class="boxText">sample CSVs + mock patient</text>
  <text x="1580" y="372" text-anchor="middle" class="boxText">guarantees live demo works</text>

  <!-- Layer 2 -->
  <line x1="225" y1="405" x2="225" y2="475" class="arrow"/>
  <line x1="565" y1="405" x2="565" y2="475" class="arrow"/>
  <line x1="905" y1="405" x2="905" y2="475" class="arrow"/>
  <line x1="1245" y1="405" x2="1245" y2="475" class="arrow"/>
  <line x1="1580" y1="405" x2="1580" y2="475" class="softArrow"/>

  <text x="90" y="465" class="layer">2. DATA GOVERNANCE + COHORT BUILDER</text>
  <rect x="120" y="490" width="1560" height="150" rx="22" fill="url(#green)" stroke="#86efac" filter="url(#shadow)"/>
  <text x="900" y="530" text-anchor="middle" class="boxTitle">Patient Alignment / Cohort Builder — must exist before fusion</text>
  <text x="900" y="565" text-anchor="middle" class="boxText">patient_id normalization • label_contract.json • splits.csv • modality availability table • missing modality mask</text>
  <text x="900" y="595" text-anchor="middle" class="boxText">prevents integration mess: no label mismatch, no patient leakage, no fake multimodal pairing</text>
  <text x="900" y="622" text-anchor="middle" class="contract">Output contract: patient_id, split, label, available_modalities, paths/features, mask=[image, clinical, histopath, genomics]</text>

  <!-- Layer 3 -->
  <line x1="900" y1="640" x2="900" y2="695" class="arrow"/>
  <text x="90" y="685" class="layer">3. MODALITY PREPROCESSING</text>
  <rect x="70" y="710" width="310" height="140" rx="18" fill="#0f766e" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="225" y="750" text-anchor="middle" class="boxTitle">Intraoral Preprocess</text>
  <text x="225" y="780" text-anchor="middle" class="boxText">resize 224/384 • normalize</text>
  <text x="225" y="807" text-anchor="middle" class="boxText">blur/brightness QC • augment</text>

  <rect x="410" y="710" width="310" height="140" rx="18" fill="#0f766e" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="565" y="750" text-anchor="middle" class="boxTitle">Clinical Preprocess</text>
  <text x="565" y="780" text-anchor="middle" class="boxText">impute • encode categories</text>
  <text x="565" y="807" text-anchor="middle" class="boxText">scale numerical features</text>

  <rect x="750" y="710" width="310" height="140" rx="18" fill="#0f766e" stroke="#5eead4" filter="url(#shadow)"/>
  <text x="905" y="750" text-anchor="middle" class="boxTitle">Histopath Preprocess</text>
  <text x="905" y="780" text-anchor="middle" class="boxText">tile/patch extraction</text>
  <text x="905" y="807" text-anchor="middle" class="boxText">stain normalization optional</text>

  <rect x="1090" y="710" width="310" height="140" rx="18" fill="url(#purple)" stroke="#c084fc" filter="url(#shadow)"/>
  <text x="1245" y="750" text-anchor="middle" class="boxTitle">Genomics Preprocess</text>
  <text x="1245" y="780" text-anchor="middle" class="boxText">QC • log/z-score • impute</text>
  <text x="1245" y="807" text-anchor="middle" class="boxText">feature selection / gene panel</text>

  <rect x="1430" y="710" width="300" height="140" rx="18" fill="#78350f" stroke="#fbbf24" filter="url(#shadow)"/>
  <text x="1580" y="750" text-anchor="middle" class="boxTitle">Artifacts</text>
  <text x="1580" y="780" text-anchor="middle" class="boxText">scalers • selected_features</text>
  <text x="1580" y="807" text-anchor="middle" class="boxText">model weights • reports</text>

  <!-- Layer 4 encoders -->
  <line x1="225" y1="850" x2="225" y2="910" class="arrow"/>
  <line x1="565" y1="850" x2="565" y2="910" class="arrow"/>
  <line x1="905" y1="850" x2="905" y2="910" class="arrow"/>
  <line x1="1245" y1="850" x2="1245" y2="910" class="arrow"/>

  <text x="90" y="900" class="layer">4. MODALITY ENCODERS</text>
  <rect x="70" y="925" width="310" height="135" rx="18" fill="#1d4ed8" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="225" y="965" text-anchor="middle" class="boxTitle">Image Encoder</text>
  <text x="225" y="995" text-anchor="middle" class="boxText">EfficientNet/ResNet/ViT</text>
  <text x="225" y="1022" text-anchor="middle" class="contract">embedding: 256-d</text>

  <rect x="410" y="925" width="310" height="135" rx="18" fill="#1d4ed8" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="565" y="965" text-anchor="middle" class="boxTitle">Clinical Encoder</text>
  <text x="565" y="995" text-anchor="middle" class="boxText">MLP / XGBoost baseline</text>
  <text x="565" y="1022" text-anchor="middle" class="contract">embedding: 128-d</text>

  <rect x="750" y="925" width="310" height="135" rx="18" fill="#1d4ed8" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text x="905" y="965" text-anchor="middle" class="boxTitle">Histopath Encoder</text>
  <text x="905" y="995" text-anchor="middle" class="boxText">CNN + MIL/attention pooling</text>
  <text x="905" y="1022" text-anchor="middle" class="contract">embedding: 256-d</text>

  <rect x="1090" y="925" width="310" height="135" rx="18" fill="url(#purple)" stroke="#e9d5ff" filter="url(#shadow)"/>
  <text x="1245" y="965" text-anchor="middle" class="boxTitle">Genomics Encoder</text>
  <text x="1245" y="995" text-anchor="middle" class="boxText">selected genes → MLP</text>
  <text x="1245" y="1022" text-anchor="middle" class="contract">embedding: 128-d</text>

  <!-- projection and fusion -->
  <line x1="225" y1="1060" x2="225" y2="1125" class="arrow"/>
  <line x1="565" y1="1060" x2="565" y2="1125" class="arrow"/>
  <line x1="905" y1="1060" x2="905" y2="1125" class="arrow"/>
  <line x1="1245" y1="1060" x2="1245" y2="1125" class="arrow"/>

  <text x="90" y="1115" class="layer">5. FUSION LAYER</text>
  <rect x="150" y="1140" width="500" height="130" rx="20" fill="#312e81" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="400" y="1182" text-anchor="middle" class="boxTitle">Projection Layer</text>
  <text x="400" y="1214" text-anchor="middle" class="boxText">project all embeddings to common hidden size</text>
  <text x="400" y="1242" text-anchor="middle" class="contract">hidden_dim = 256</text>

  <rect x="760" y="1140" width="710" height="130" rx="20" fill="url(#orange)" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="1115" y="1182" text-anchor="middle" class="boxTitle">Missing-Modality-Aware Cross-Modal Transformer</text>
  <text x="1115" y="1214" text-anchor="middle" class="boxText">uses modality tokens + availability mask + confidence weights</text>
  <text x="1115" y="1242" text-anchor="middle" class="contract">joint embedding → diagnosis/risk heads</text>
  <line x1="650" y1="1205" x2="760" y2="1205" class="arrow"/>

  <!-- heads -->
  <line x1="1115" y1="1270" x2="1115" y2="1325" class="arrow"/>
  <text x="90" y="1320" class="layer">6. PREDICTION HEADS</text>
  <rect x="220" y="1345" width="360" height="130" rx="18" fill="#7f1d1d" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="400" y="1387" text-anchor="middle" class="boxTitle">Diagnosis Head</text>
  <text x="400" y="1420" text-anchor="middle" class="boxText">benign / precancer / cancer</text>
  <text x="400" y="1447" text-anchor="middle" class="tiny">or binary if dataset forces it</text>

  <rect x="720" y="1345" width="360" height="130" rx="18" fill="#7f1d1d" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="900" y="1387" text-anchor="middle" class="boxTitle">Risk Head</text>
  <text x="900" y="1420" text-anchor="middle" class="boxText">low / medium / high risk</text>
  <text x="900" y="1447" text-anchor="middle" class="tiny">or continuous risk score</text>

  <rect x="1220" y="1345" width="360" height="130" rx="18" fill="#7f1d1d" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="1400" y="1387" text-anchor="middle" class="boxTitle">Confidence + Calibration</text>
  <text x="1400" y="1420" text-anchor="middle" class="boxText">temperature scaling / warning</text>
  <text x="1400" y="1447" text-anchor="middle" class="tiny">avoid raw softmax claims</text>

  <!-- XAI -->
  <line x1="900" y1="1475" x2="900" y2="1530" class="arrow"/>
  <text x="90" y="1525" class="layer">7. EXPLAINABILITY + CLINICAL REPORT</text>
  <rect x="90" y="1550" width="365" height="135" rx="18" fill="url(#pink)" stroke="#f9a8d4" filter="url(#shadow)"/>
  <text x="272" y="1590" text-anchor="middle" class="boxTitle">Image XAI</text>
  <text x="272" y="1623" text-anchor="middle" class="boxText">Grad-CAM lesion heatmap</text>
  <text x="272" y="1650" text-anchor="middle" class="tiny">visual evidence</text>

  <rect x="505" y="1550" width="365" height="135" rx="18" fill="url(#pink)" stroke="#f9a8d4" filter="url(#shadow)"/>
  <text x="687" y="1590" text-anchor="middle" class="boxTitle">Clinical + Genomic XAI</text>
  <text x="687" y="1623" text-anchor="middle" class="boxText">SHAP top risk factors / genes</text>
  <text x="687" y="1650" text-anchor="middle" class="tiny">doctor-readable reasons</text>

  <rect x="920" y="1550" width="365" height="135" rx="18" fill="url(#pink)" stroke="#f9a8d4" filter="url(#shadow)"/>
  <text x="1102" y="1590" text-anchor="middle" class="boxTitle">Fusion XAI</text>
  <text x="1102" y="1623" text-anchor="middle" class="boxText">modality contribution chart</text>
  <text x="1102" y="1650" text-anchor="middle" class="tiny">why final decision changed</text>

  <rect x="1335" y="1550" width="365" height="135" rx="18" fill="url(#green)" stroke="#86efac" filter="url(#shadow)"/>
  <text x="1517" y="1590" text-anchor="middle" class="boxTitle">Web UI + PDF Report</text>
  <text x="1517" y="1623" text-anchor="middle" class="boxText">Streamlit/FastAPI demo</text>
  <text x="1517" y="1650" text-anchor="middle" class="tiny">prediction + evidence + disclaimer</text>

  <!-- bottom contracts -->
  <rect x="70" y="1725" width="1660" height="105" rx="22" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="900" y="1760" text-anchor="middle" class="contract">NON-NEGOTIABLE INTEGRATION CONTRACTS</text>
  <text x="900" y="1794" text-anchor="middle" class="tiny">Every module returns: patient_id • modality • status • embedding • embedding_dim • prediction • confidence • explanations • schema_version</text>
  <text x="900" y="1822" text-anchor="middle" class="tiny">Fusion receives: embeddings dict + modality_mask. No module owns labels/splits alone. No preprocessing fit on val/test data.</text>

  <!-- USP Rail -->
  <rect x="1450" y="440" width="280" height="220" rx="22" fill="#172554" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
  <text x="1590" y="478" text-anchor="middle" class="boxTitle">WOW USP FACTORS</text>
  <text x="1475" y="515" class="tiny">✓ Missing modality safe</text>
  <text x="1475" y="545" class="tiny">✓ Doctor-readable report</text>
  <text x="1475" y="575" class="tiny">✓ Modality contribution score</text>
  <text x="1475" y="605" class="tiny">✓ Genomic biomarker panel</text>
  <text x="1475" y="635" class="tiny">✓ Demo patient simulator</text>

  <path d="M1430 550 C1370 560 1340 650 1245 710" class="dash"/>
</svg>
