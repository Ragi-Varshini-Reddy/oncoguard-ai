<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 2000" font-family="Arial, Helvetica, sans-serif">

  <!-- Background -->
  <rect width="900" height="2000" fill="#f8f8f6"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- HEADER BAND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="900" height="90" fill="#1a1a2e"/>
  <text x="40" y="36" font-size="22" font-weight="700" fill="#ffffff">OralAI Diagnostic Report</text>
  <text x="40" y="58" font-size="12" fill="#9fa8b4">AI-Assisted Oral Cancer Detection &amp; Risk Assessment System</text>
  <text x="40" y="76" font-size="11" fill="#6b7685">Report ID: {{ report_id }}  |  Generated: {{ generated_at }}  |  AI Model: {{ ai_model_version }}  |  Reviewed by: {{ reviewer_name }}</text>

  <!-- HIGH RISK BADGE -->
  <rect x="720" y="20" width="150" height="50" rx="8" fill="{{ risk_color }}"/>
  <text x="795" y="40" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">{{ risk_level_upper }}</text>
  <text x="795" y="58" font-size="10" fill="#ffc0c0" text-anchor="middle">{{ urgency_action }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 1: PATIENT INFORMATION -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="106" width="860" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="106" width="4" height="130" rx="2" fill="#4a90d9"/>

  <text x="36" y="128" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">1. PATIENT INFORMATION</text>

  <!-- Row 1 -->
  <text x="40" y="152" font-size="11" fill="#718096">Name</text>
  <text x="40" y="168" font-size="13" font-weight="600" fill="#1a202c">{{ patient_name }}</text>

  <text x="200" y="152" font-size="11" fill="#718096">Age / Sex</text>
  <text x="200" y="168" font-size="13" font-weight="600" fill="#1a202c">{{ age }} yrs / {{ sex }}</text>

  <text x="360" y="152" font-size="11" fill="#718096">Patient ID</text>
  <text x="360" y="168" font-size="13" font-weight="600" fill="#1a202c">{{ patient_id }}</text>

  <text x="520" y="152" font-size="11" fill="#718096">Visit Date</text>
  <text x="520" y="168" font-size="13" font-weight="600" fill="#1a202c">{{ visit_date }}</text>

  <text x="680" y="152" font-size="11" fill="#718096">Department</text>
  <text x="680" y="168" font-size="13" font-weight="600" fill="#1a202c">{{ department }}</text>

  <!-- Row 2 -->
  <text x="40" y="196" font-size="11" fill="#718096">Referred by</text>
  <text x="40" y="212" font-size="13" font-weight="600" fill="#1a202c">{{ referred_by }}</text>

  <text x="200" y="196" font-size="11" fill="#718096">Contact</text>
  <text x="200" y="212" font-size="13" font-weight="600" fill="#1a202c">{{ contact }}</text>

  <text x="360" y="196" font-size="11" fill="#718096">Address</text>
  <text x="360" y="212" font-size="13" font-weight="600" fill="#1a202c">{{ address }}</text>

  <text x="520" y="196" font-size="11" fill="#718096">Medical History</text>
  <text x="520" y="212" font-size="13" font-weight="600" fill="#1a202c">{{ medical_history }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 2: AI RISK SUMMARY -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="252" width="860" height="170" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="252" width="4" height="170" rx="2" fill="{{ risk_color }}"/>

  <text x="36" y="274" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">2. AI RISK SUMMARY</text>

  <!-- Metric boxes -->
  <rect x="36" y="284" width="190" height="80" rx="6" fill="#fff5f5"/>
  <text x="131" y="308" font-size="11" fill="#c53030" text-anchor="middle">Malignancy Probability</text>
  <text x="131" y="344" font-size="32" font-weight="700" fill="#c53030" text-anchor="middle">{{ risk_score_percent }}</text>

  <rect x="242" y="284" width="190" height="80" rx="6" fill="#fff5f5"/>
  <text x="337" y="308" font-size="11" fill="#c53030" text-anchor="middle">Biopsy Urgency Score</text>
  <text x="337" y="344" font-size="32" font-weight="700" fill="#c53030" text-anchor="middle">{{ urgency_score }}</text>

  <rect x="448" y="284" width="190" height="80" rx="6" fill="#f0f4ff"/>
  <text x="543" y="308" font-size="11" fill="#2b4acb" text-anchor="middle">AI Confidence</text>
  <text x="543" y="344" font-size="32" font-weight="700" fill="#2b4acb" text-anchor="middle">{{ confidence_percent }}</text>

  <rect x="654" y="284" width="210" height="80" rx="6" fill="#fffbf0"/>
  <text x="759" y="308" font-size="11" fill="#b7791f" text-anchor="middle">Provisional Diagnosis</text>
  <text x="759" y="336" font-size="15" font-weight="700" fill="#b7791f" text-anchor="middle">{{ diagnosis_class }}</text>
  <text x="759" y="354" font-size="13" font-weight="600" fill="#b7791f" text-anchor="middle">{{ diagnosis_stage }}</text>

  <!-- Risk bar -->
  <text x="36" y="388" font-size="11" fill="#718096">Overall risk level</text>
  <rect x="36" y="396" width="820" height="12" rx="6" fill="#fed7d7"/>
  <rect x="36" y="396" width="{{ risk_bar_width }}" height="12" rx="6" fill="{{ risk_color }}"/>
  <text x="715" y="407" font-size="11" font-weight="700" fill="#c53030">{{ risk_score_percent }} — {{ risk_level_upper }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 3: CLINICAL PARAMETERS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="438" width="860" height="165" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="438" width="4" height="165" rx="2" fill="#805ad5"/>

  <text x="36" y="460" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">3. CLINICAL PARAMETERS RECORDED</text>

  <!-- Left column -->
  <text x="40" y="484" font-size="11" fill="#718096">Lesion Site</text>
  <text x="40" y="500" font-size="13" font-weight="600" fill="#1a202c">{{ lesion_site }}</text>

  <text x="40" y="524" font-size="11" fill="#718096">Lesion Size</text>
  <text x="40" y="540" font-size="13" font-weight="600" fill="#1a202c">{{ lesion_size }}</text>

  <text x="40" y="564" font-size="11" fill="#718096">Lesion Type</text>
  <text x="40" y="580" font-size="13" font-weight="600" fill="#1a202c">{{ lesion_type }}</text>

  <text x="40" y="604" font-size="11" fill="#718096">Duration of Lesion</text>
  <text x="40" y="594" font-size="13" font-weight="600" fill="#1a202c">{{ lesion_duration }}</text>

  <!-- Right column -->
  <text x="300" y="484" font-size="11" fill="#718096">Tobacco Use</text>
  <text x="300" y="500" font-size="13" font-weight="600" fill="#1a202c">{{ tobacco_history }}</text>

  <text x="300" y="524" font-size="11" fill="#718096">Alcohol Use</text>
  <text x="300" y="540" font-size="13" font-weight="600" fill="#1a202c">{{ alcohol_history }}</text>

  <text x="300" y="564" font-size="11" fill="#718096">Pain / Symptoms</text>
  <text x="300" y="580" font-size="13" font-weight="600" fill="#1a202c">{{ symptoms }}</text>

  <!-- Right-2 column -->
  <text x="570" y="484" font-size="11" fill="#718096">Prior Oral Lesions</text>
  <text x="570" y="500" font-size="13" font-weight="600" fill="#1a202c">{{ prior_lesions }}</text>

  <text x="570" y="524" font-size="11" fill="#718096">Lymph Nodes (clinical)</text>
  <text x="570" y="540" font-size="13" font-weight="600" fill="#1a202c">{{ lymph_nodes }}</text>

  <text x="570" y="564" font-size="11" fill="#718096">Trismus</text>
  <text x="570" y="580" font-size="13" font-weight="600" fill="#1a202c">{{ trismus }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 4: IMAGING ANALYSIS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="618" width="860" height="200" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="618" width="4" height="200" rx="2" fill="#38a169"/>

  <text x="36" y="640" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">4. IMAGING ANALYSIS</text>

  <!-- Intraoral photo box -->
  <rect x="36" y="650" width="390" height="152" rx="6" fill="#f7fafc" stroke="#cbd5e0" stroke-width="0.5"/>
  <text x="42" y="668" font-size="11" font-weight="700" fill="#2d3748">Intraoral Photograph</text>
  <rect x="42" y="674" width="180" height="110" rx="4" fill="#e2e8f0"/>
  <text x="132" y="735" font-size="10" fill="#718096" text-anchor="middle">[ AI-Annotated Photo ]</text>
  <text x="132" y="750" font-size="9" fill="#a0aec0" text-anchor="middle">Heatmap overlay active</text>
  <text x="232" y="690" font-size="10" font-weight="600" fill="#2d3748">AI Finding:</text>
  <text x="232" y="706" font-size="10" fill="#4a5568">{{ intraoral_finding_1 }}</text>
  <text x="232" y="720" font-size="10" fill="#4a5568">{{ intraoral_finding_2 }}</text>
  <text x="232" y="734" font-size="10" fill="#4a5568">{{ intraoral_finding_3 }}</text>
  <text x="232" y="748" font-size="10" fill="#4a5568">Confidence Score: {{ intraoral_confidence }}%</text>
  <rect x="232" y="772" width="100" height="18" rx="9" fill="#fed7d7"/>
  <text x="282" y="784" font-size="9" font-weight="700" fill="#c53030" text-anchor="middle">{{ intraoral_badge }}</text>

  <!-- Histopath slide box -->
  <rect x="446" y="650" width="418" height="152" rx="6" fill="#f7fafc" stroke="#cbd5e0" stroke-width="0.5"/>
  <text x="452" y="668" font-size="11" font-weight="700" fill="#2d3748">Histopathological Slide</text>
  <rect x="452" y="674" width="180" height="110" rx="4" fill="#e2e8f0"/>
  <text x="542" y="735" font-size="10" fill="#718096" text-anchor="middle">[ Grad-CAM Heatmap ]</text>
  <text x="542" y="750" font-size="9" fill="#a0aec0" text-anchor="middle">ROIs analyzed</text>
  <text x="645" y="690" font-size="10" font-weight="600" fill="#2d3748">AI Finding:</text>
  <text x="645" y="706" font-size="10" fill="#4a5568">{{ histopath_finding_1 }}</text>
  <text x="645" y="720" font-size="10" fill="#4a5568">{{ histopath_finding_2 }}</text>
  <text x="645" y="734" font-size="10" fill="#4a5568">{{ histopath_finding_3 }}</text>
  <text x="645" y="748" font-size="10" fill="#4a5568">Confidence Score: {{ histopath_confidence }}%</text>
  <rect x="645" y="772" width="100" height="18" rx="9" fill="#fed7d7"/>
  <text x="695" y="784" font-size="9" font-weight="700" fill="#c53030" text-anchor="middle">{{ histopath_badge }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 5: HISTOPATHOLOGICAL FINDINGS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="834" width="860" height="140" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="834" width="4" height="140" rx="2" fill="#dd6b20"/>

  <text x="36" y="856" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">5. HISTOPATHOLOGICAL FINDINGS</text>

  <text x="40" y="880" font-size="11" fill="#718096">Dysplasia Grade</text>
  <rect x="40" y="886" width="70" height="18" rx="9" fill="#fed7d7"/>
  <text x="75" y="898" font-size="9" font-weight="700" fill="#c53030" text-anchor="middle">{{ dysplasia_grade_upper }}</text>

  <text x="180" y="880" font-size="11" fill="#718096">Mitotic Activity</text>
  <text x="180" y="900" font-size="13" font-weight="600" fill="#1a202c">{{ mitotic_activity }}</text>

  <text x="320" y="880" font-size="11" fill="#718096">Perineural Invasion</text>
  <text x="320" y="900" font-size="13" font-weight="600" fill="#1a202c">{{ perineural_invasion }}</text>

  <text x="480" y="880" font-size="11" fill="#718096">Keratinisation</text>
  <text x="480" y="900" font-size="13" font-weight="600" fill="#1a202c">{{ keratinisation }}</text>

  <text x="620" y="880" font-size="11" fill="#718096">Vascular Invasion</text>
  <text x="620" y="900" font-size="13" font-weight="600" fill="#1a202c">{{ vascular_invasion }}</text>

  <text x="740" y="880" font-size="11" fill="#718096">Tumour Differentiation</text>
  <text x="740" y="900" font-size="13" font-weight="600" fill="#1a202c">{{ tumour_diff }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 6: GENOMIC PROFILE -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="990" width="860" height="200" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="990" width="4" height="200" rx="2" fill="#6b46c1"/>

  <text x="36" y="1012" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">6. GENOMIC PROFILE — PLAIN LANGUAGE SUMMARY</text>

  <rect x="36" y="1022" width="400" height="75" rx="6" fill="#fff5f5" stroke="#fed7d7" stroke-width="0.5"/>
  <text x="46" y="1040" font-size="11" font-weight="700" fill="#2d3748">TP53 Mutation</text>
  <rect x="160" y="1028" width="120" height="16" rx="8" fill="#e53e3e"/>
  <text x="220" y="1040" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">{{ tp53_variant }}</text>
  <text x="46" y="1058" font-size="10" fill="#4a5568">Associated with aggressive behaviour and</text>
  <text x="46" y="1072" font-size="10" fill="#4a5568">poor prognosis. Reduces chemotherapy response.</text>

  <rect x="450" y="1022" width="408" height="75" rx="6" fill="#fffbf0" stroke="#fefcbf" stroke-width="0.5"/>
  <text x="460" y="1040" font-size="11" font-weight="700" fill="#2d3748">NOTCH1 Mutation</text>
  <rect x="580" y="1028" width="130" height="16" rx="8" fill="#d69e2e"/>
  <text x="645" y="1040" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">{{ notch1_variant }}</text>
  <text x="460" y="1058" font-size="10" fill="#4a5568">Loss-of-function variant. Linked to</text>
  <text x="460" y="1072" font-size="10" fill="#4a5568">early invasion. May affect targeted therapy.</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 7: XAI EXPLAINABILITY -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="1206" width="860" height="200" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="0.8"/>
  <rect x="20" y="1206" width="4" height="200" rx="2" fill="#e53e3e"/>

  <text x="36" y="1228" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">7. AI EXPLAINABILITY — WHAT DROVE THIS DIAGNOSIS</text>

  <text x="40" y="1256" font-size="12" fill="#2d3748">Histopathological slide</text>
  <rect x="210" y="1244" width="550" height="18" rx="9" fill="#f7fafc"/>
  <rect x="210" y="1244" width="{{ histopath_contribution_width }}" height="18" rx="9" fill="#e53e3e"/>
  <text x="785" y="1258" font-size="12" font-weight="700" fill="#c53030">{{ histopath_contribution_percent }}</text>

  <text x="40" y="1290" font-size="12" fill="#2d3748">Intraoral photograph</text>
  <rect x="210" y="1278" width="550" height="18" rx="9" fill="#f7fafc"/>
  <rect x="210" y="1278" width="{{ photo_contribution_width }}" height="18" rx="9" fill="#3182ce"/>
  <text x="785" y="1292" font-size="12" font-weight="700" fill="#2b6cb0">{{ photo_contribution_percent }}</text>

  <text x="40" y="1324" font-size="12" fill="#2d3748">Clinical parameters</text>
  <rect x="210" y="1312" width="550" height="18" rx="9" fill="#f7fafc"/>
  <rect x="210" y="1312" width="{{ clinical_contribution_width }}" height="18" rx="9" fill="#38a169"/>
  <text x="785" y="1326" font-size="12" font-weight="700" fill="#276749">{{ clinical_contribution_percent }}</text>

  <text x="40" y="1358" font-size="12" fill="#2d3748">Genomic data</text>
  <rect x="210" y="1346" width="550" height="18" rx="9" fill="#f7fafc"/>
  <rect x="210" y="1346" width="{{ genomic_contribution_width }}" height="18" rx="9" fill="#805ad5"/>
  <text x="785" y="1360" font-size="12" font-weight="700" fill="#553c9a">{{ genomic_contribution_percent }}</text>

  <line x1="36" y1="1378" x2="864" y2="1378" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="36" y="1396" font-size="11" font-weight="700" fill="#2d3748">Top Features Flagged:</text>
  <text x="36" y="1412" font-size="11" fill="#4a5568">1. {{ top_feature_1 }}</text>
  <text x="36" y="1426" font-size="11" fill="#4a5568">2. {{ top_feature_2 }}</text>
  <text x="36" y="1440" font-size="11" fill="#4a5568">3. {{ top_feature_3 }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 8: CLINICAL RECOMMENDATIONS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="1460" width="860" height="230" rx="8" fill="#ffffff" stroke="#fed7d7" stroke-width="1"/>
  <rect x="20" y="1460" width="4" height="230" rx="2" fill="#e53e3e"/>
  <text x="36" y="1482" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">8. CLINICAL RECOMMENDATIONS &amp; ACTION PLAN</text>
  <text x="70" y="1506" font-size="12" font-weight="700" fill="#2d3748">DOCTOR REVIEWED ACTION PLAN</text>
  <text x="70" y="1522" font-size="11" fill="#4a5568">{{ action_plan_1 }}</text>
  <text x="70" y="1542" font-size="11" fill="#4a5568">{{ action_plan_2 }}</text>
  <text x="70" y="1562" font-size="11" fill="#4a5568">{{ action_plan_3 }}</text>

  <line x1="36" y1="1668" x2="864" y2="1668" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="36" y="1686" font-size="11" fill="#718096">Next AI follow-up review: Post-treatment Week 6.</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- SECTION 9: PATIENT-FRIENDLY SUMMARY -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="20" y="1710" width="860" height="175" rx="8" fill="#ebf8ff" stroke="#bee3f8" stroke-width="0.8"/>
  <rect x="20" y="1710" width="4" height="175" rx="2" fill="#3182ce"/>
  <text x="36" y="1732" font-size="10" font-weight="700" fill="#2b6cb0" letter-spacing="1">9. PATIENT-FRIENDLY SUMMARY</text>
  <text x="36" y="1756" font-size="11" fill="#2c5282">Dear {{ first_name }},</text>
  <text x="36" y="1774" font-size="11" fill="#2c5282">{{ patient_summary_line_1 }}</text>
  <text x="36" y="1790" font-size="11" fill="#2c5282">{{ patient_summary_line_2 }}</text>
  <text x="36" y="1806" font-size="11" fill="#2c5282">{{ patient_summary_line_3 }}</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FOOTER -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="0" y="1910" width="900" height="60" fill="#1a1a2e"/>
  <text x="450" y="1932" font-size="10" fill="#718096" text-anchor="middle">This report is AI-assisted and intended to support — not replace — clinical judgment.</text>
  <text x="450" y="1948" font-size="10" fill="#4a5568" text-anchor="middle">OralAI {{ ai_model_version }}  |  Report ID: {{ report_id }}  |  Confidential — For Clinical Use Only</text>

</svg>
