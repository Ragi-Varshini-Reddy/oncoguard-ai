    CDKN2A_expr: 0.42
    EGFR_expr: 0.58
    PIK3CA_expr: 0.46
    NOTCH1_expr: 0.38
    CCND1_expr: 0.5
    FAT1_expr: 0.44
    CASP8_expr: 0.35
    HRAS_expr: 0.3
    MET_expr: 0.48
    MYC_expr: 0.55
    MDM2_expr: 0.41
  demo_means:
