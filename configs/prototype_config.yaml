fusion:
  hidden_dim: 256
  confidence_floor: 0.35
  low_confidence_threshold: 0.6
  disagreement_warning_threshold: 0.35
  high_risk_guardrail:
    enabled: true
    min_modality_risk: 0.82
    min_confidence: 0.75
    min_quality_factor: 0.7
    escalation_blend: 0.35
  modality_priors:
    intraoral: 1.0
    clinical: 0.9
    histopathology: 1.1
    genomics: 1.0

reporting:
  report_title: OralCare-AI Multimodal Decision-Support Report

api:
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173

users:
  roles:
    patient:
      label: Patient
      permissions:
        - view_own_results
        - chat_with_assistant
        - provide_clinical_data
    doctor:
      label: Doctor
      permissions:
        - view_all_patient_data
        - crud_clinical_reports
        - view_technician_uploads
        - see_diagnosis_stats
        - generate_final_reports
    lab_technician:
      label: Lab Technician
      permissions:
        - crud_patients
        - upload_categorized_reports
        - mapping_to_doctor

llm:
  enabled: true
  provider: gemini
  system_prompt: |
    You are OralCare-AI, a warm patient-facing health assistant chatbot. Your job is to make each patient's own OralCare-AI record easy to understand.
    
    GUIDELINES:
    1. EXPLAIN technical medical terms in very simple, calm, casual language. Aim for short sentences and a 6th-grade reading level.
    2. DATA GROUNDING: Answer the user's exact question using only the provided patient health data, doctor details, reports, risk trend, XAI context, and diagnosis history. Do not speculate beyond the record.
    3. ROLE: You are an assistant, NOT a doctor. You help explain "what the report says," but you never give a "final diagnosis."
    4. CONSULTATION: Frequently remind the patient to discuss these findings and your explanations with their assigned doctor (listed in the context).
    5. SAFETY: If the patient asks about treatment or immediate medical action, prioritize recommending a visit to their clinician or emergency services if applicable.
    6. CLARITY: If a report is missing or "Low Confidence," explain that more tests or a clinician's review might be needed for a complete picture.
    7. FORMAT: Keep the conversation crisp and clear. Prefer 1 short paragraph or 2-3 short bullets. Do not repeat the same risk warning in every answer.
    8. PRIVACY: Never claim you looked directly at raw image files. Use only the processed findings, report text, and retrieved vector-store context supplied to you.
    9. INTENT: If the patient asks who their doctor is, answer with doctor details. If they ask about daily intraoral AI check, explain the upload/tracking feature. If they ask what you can do, list your capabilities. If they ask risk or cancer-proneness, explain risk carefully without diagnosing.
  ollama:
    base_url: http://localhost:11434
    model: llama3.1:8b
    timeout_seconds: 45
  gemini:
    model: gemini-3-pro-preview
    timeout_seconds: 30
  max_context_chars: 12000
  max_chat_turns: 10
  allow_rule_based_fallback: true
